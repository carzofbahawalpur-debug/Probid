<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProBid | Forgot Password</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f172a;
    --card:#111827;
    --silver:#e5e7eb;
    --muted:#9ca3af;

    --blue:#38bdf8;
    --purple:#a78bfa;
}

*{font-family:'Poppins',sans-serif;}
body{
    background:linear-gradient(135deg,#020617,#1e293b);
    color:var(--silver);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* NAVBAR */
.navbar{background:#1f2025;}
.navbar-brand{font-weight:700;color:var(--silver)!important;}
.nav-link{color:var(--silver)!important;}
.nav-link:hover{color:var(--blue)!important;}

/* CENTER */
.center-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding-top:80px;
}

/* CARD */
.card{
    background:var(--card);
    border:none;
    border-radius:16px;
    padding:35px;
    width:100%;
    max-width:420px;
    height:100%;
    position:relative;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
    box-shadow:0 30px 70px rgba(0,0,0,.6);
    border-top:6px solid var(--blue);
}
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:linear-gradient(90deg,var(--blue),var(--violet),var(--cyan));
    border-radius:16px 16px 0 0;
}

.card h4{
    color:#43a6ce;
    font-weight:700;
    text-align:center;
}
.card p{
    color:var(--silver);
    text-align:center;
    font-size:.95rem;
    margin-bottom:25px;
}

/* FORM */
.form-control{
    background:#1f2025;
    border:1px solid #62bcd8;
    color:#fff;
    padding:12px;
}
.form-control:focus{
    background:#1f2025;
    border-color:var(--blue);
    box-shadow:none;
    color:#fff;
}

.btn-reset{
    background:linear-gradient(90deg,var(--blue),var(--cyan));
    border:none;
    padding:12px;
    font-weight:600;
    color:#77a7e6;
    width:100%;
    border-radius:30px;
    transition:.3s;
}
.btn-reset:hover{opacity:.85;}

.back-link{
    display:block;
    text-align:center;
    margin-top:20px;
    color:var(--silver);
    text-decoration:none;
    font-size:.9rem;
}
.back-link:hover{color:var(--blue);}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
<a class="navbar-brand" href="#">ProBid</a>
</div>
</nav>

<!-- FORGOT PASSWORD -->
<div class="center-wrap">
<div class="card">
<h4>Forgot Password</h4>
<p>Enter your registered email to receive a reset link.</p>

<form>
    <div class="mb-3">
        <input type="email" class="form-control" placeholder="Email Address" required>
    </div>
    <button type="submit" class="btn-reset">Send Reset Link</button>
</form>

<a href="login.html" class="back-link">← Back to Login</a>
</div>
</div>

</body>
</html>
