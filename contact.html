<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProBid | Contact Us</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f172a;--card:#111827;--silver:#e5e7eb;--muted:#9ca3af;--blue:#38bdf8;}
*{font-family:'Poppins',sans-serif;}
body{background:var(--bg);color:var(--silver);}
.navbar{background:#020617;}.navbar-brand{font-weight:700;color:#fff!important;}.nav-link{color:var(--muted)!important;}
.nav-link:hover{color:#fff!important;}
.hero{padding:80px 20px;text-align:center;}
.hero h1{font-size:2.5rem;font-weight:700;color:#fff;}
.section{padding:60px 20px;}
.form-control{background:#020617;border:1px solid #374151;color:#fff;}
footer{background:#020617;padding:60px 20px;border-top:1px solid #1f2937;}
footer a{color:var(--muted);text-decoration:none;display:block;margin-bottom:8px;font-size:14px;}
footer a:hover{color:#fff;}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
<div class="container"><a class="navbar-brand" href="index.html">ProBid</a></div>
</nav>

<section class="hero">
<h1>Contact Us</h1>
<p>We are here to help you.</p>
</section>

<section class="section">
<div class="container" style="max-width:600px;">
    <div class="card">
        <div class="card-body">
            <h5 class="mb-4" style="color:#fff;">Send us a Message</h5>
            <form>
                <div class="mb-3">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-control" placeholder="Enter name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="5" placeholder="How can we help?"></textarea>
                </div>
                <button class="btn btn-primary w-100" style="background:var(--blue); border:none; color:#000;">Send Message</button>
            </form>
            
            <hr style="border-color:#374151; margin:30px 0;">
            
            <h6 style="color:var(--blue);">Direct Contact Info:</h6>
            <p>📧 Email: support@probid.com</p>
            <p>📞 Phone: +92 300 1234567</p>
            <p>📍 Address: Main Office, Gulberg III, Lahore</p>
        </div>
    </div>
</div>
</section>

<footer>
<div class="container">
<div class="row">
    <div class="col-md-3"><h5>Platform</h5><a href="proposal.html">Proposals</a><a href="vendors.html">Bidding</a></div>
    <div class="col-md-3"><h5>Company</h5><a href="contact.html">About</a><a href="careers.html">Careers</a></div>
    <div class="col-md-3"><h5>Support</h5><a href="help.html">Help</a><a href="contact.html">Contact</a></div>
    <div class="col-md-3"><h5>Legal</h5><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a></div>
</div>
<div class="text-center mt-4" style="color:#6b7280; font-size:12px;">© 2025 ProBid</div>
</div>
</footer>
</body>
</html>
