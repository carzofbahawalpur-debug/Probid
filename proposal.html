<!-- The JavaScript that connects to Python API -->
<!-- THE BRAIN OF THE PAGE -->
<!-- THE COMPLETE BRAIN OF THE PAGE -->
<script>
    // A global variable to store all projects
    let allProjects = [];
    // A global variable to store the ID of the project we are bidding on
    let currentProjectId;

    // --- FUNCTION 1: Show Project Details Modal ---
    function showProjectDetails(projectId) {
        const project = allProjects.find(p => p.id == projectId);
        if (!project) {
            alert("Project details not found!");
            return;
        }
        const deadlineDate = new Date(project.deadline);
        const today = new Date();
        const timeDiff = deadlineDate - today;
        const daysDiff = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
        let deadlineText = '';
        if (daysDiff < 0) {
            deadlineText = `Expired ${Math.abs(daysDiff)} days ago.`;
        } else {
            deadlineText = `${daysDiff} days remaining.`;
        }
        document.getElementById('detail-title').innerText = project.title;
        document.getElementById('detail-description').innerText = project.desc;
        document.getElementById('detail-budget').innerText = project.budget.toLocaleString();
        document.getElementById('detail-min-bid').innerText = project.min_bid.toLocaleString();
        document.getElementById('detail-status').innerText = project.status;
        document.getElementById('detail-deadline-days').innerText = deadlineText;
        const myModal = new bootstrap.Modal(document.getElementById('projectDetailsModal'));
        myModal.show();
    }

    // --- FUNCTION 2: Open the Bid Modal ---
    function openBidModal(projectId, projectTitle, minBid) {
        const user = JSON.parse(sessionStorage.getItem('user'));
        if (!user) {
            alert('You must be logged in to place a bid!');
            window.location.href = 'login.html';
            return;
        }
        document.getElementById('projectTitle').innerText = projectTitle;
        document.getElementById('minBid').innerText = minBid;
        document.getElementById('bidAmount').min = minBid;
        window.currentProjectId = projectId;
        const myModal = new bootstrap.Modal(document.getElementById('bidModal'));
        myModal.show();
    }

    // --- FUNCTION 3: Submit the Bid ---
    async function submitBid() {
        const user = JSON.parse(sessionStorage.getItem('user'));
        const amount = document.getElementById('bidAmount').value;
        const deliveryDays = document.getElementById('deliveryDays').value;
        const response = await fetch('http://localhost:5000/api/bid', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                projectId: window.currentProjectId,
                username: user.username,
                amount: parseFloat(amount),
                deliveryDays: parseInt(deliveryDays)
            })
        });
        const result = await response.json();
        if (result.success) {
            alert('Bid submitted successfully!');
            bootstrap.Modal.getInstance(document.getElementById('bidModal')).hide();
        } else {
            alert('Error: ' + result.message);
        }
    }

    // --- MAIN FUNCTION: Runs when the page loads ---
    document.addEventListener('DOMContentLoaded', function() {
        const apiUrl = 'http://localhost:5000/projects';
        fetch(apiUrl)
            .then(response => response.json())
            .then(projects => {
                allProjects = projects; // Store projects globally
                const projectContainer = document.querySelector('.row.g-4');
                projectContainer.innerHTML = '';
                projects.forEach(project => {
                    const cardHtml = `
                        <div class="col-md-4">
                            <div class="card border-blue">
                                <span class="badge badge-custom mb-2">${project.status}</span>
                                <h5>${project.title}</h5>
                                <p>${project.desc}</p>
                                <p>Budget: ${project.budget} PKR</p>
                                <p>Min Bid: ${project.min_bid} PKR</p>
                                <button onclick="showProjectDetails(${project.id})" class="btn-view">View Details</button>
                                <button onclick="openBidModal(${project.id}, '${project.title}', ${project.min_bid})" class="btn-view" style="margin-left: 5px;">Place Bid</button>
                            </div>
                        </div>
                    `;
                    projectContainer.innerHTML += cardHtml;
                });
            })
            .catch(error => {
                console.error('Error fetching projects:', error);
                const projectContainer = document.querySelector('.row.g-4');
                projectContainer.innerHTML = '<p class="text-danger">Could not load projects. Is the Python API running?</p>';
            });
    });
</script>
<!-- Project Details Modal -->
<div class="modal fade" id="projectDetailsModal" tabindex="-1" aria-labelledby="projectDetailsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background: var(--card); color: var(--silver);">

      </div>
      <div class="modal-body">

        <hr style="border-color: var(--muted);">

                <p><strong>Minimum Bid:</strong> <span id="detail-min-bid"></span> PKR</p>

            <div class="col-md-6">

            </div>

      </div>
      <div class="modal-footer">

      </div>
    </div>
  </div>
</div>
