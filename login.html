<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProBid | Login</title>
<!-- Bootstrap and CSS (keep your existing styles) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{ --bg:#0f172a; --card:#111827; --silver:#e5e7eb; --muted:#9ca3af; --blue:#38bdf8; --purple:#a78bfa; }
*{font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#020617,#1e293b);color:var(--silver);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:var(--card);border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 30px 70px rgba(0,0,0,.6);border-top:6px solid var(--blue);}
.login-card h2{color:#fff;font-weight:700;text-align:center;margin-bottom:10px;}
.login-card p{text-align:center;color:var(--muted);margin-bottom:30px;}
.form-control{background:#020617;border:1px solid #1f2937;color:#fff;padding:12px;border-radius:12px;}
.form-control:focus{background:#020617;border-color:var(--blue);box-shadow:none;color:#fff;}
.btn-login{background:linear-gradient(135deg,var(--blue),var(--purple));border:none;padding:12px;border-radius:30px;font-weight:600;color:#000;width:100%;}
.btn-login:hover{opacity:.9;}
.link{color:var(--blue);text-decoration:none;font-size:14px;}
.link:hover{color:#fff;}
.footer-text{text-align:center;margin-top:25px;font-size:14px;color:var(--muted);}
</style>
</head>
<body>

<div class="login-card">
    <h2>ProBid Login</h2>
    <p>Access your proposals & bids</p>
    <div id="error-message" class="alert alert-danger" style="display:none;"></div>
    <form id="loginForm">
        <div class="mb-3">
            <input type="text" class="form-control" id="username" placeholder="Username" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" id="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-login">Login</button>
    <!-- Paste this inside your login card form -->
<a href="index.html" style="display:block; text-align:center; color:var(--blue); margin-top:15px;">← Back to Home</a>
    </form>
    <div class="footer-text">Don’t have an account? <a href="register.html" class="link">Register</a></div>
</div>

<!-- THE SMART JAVASCRIPT BRAIN -->
<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Stop the form from doing a normal page reload

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');

        try {
            const response = await fetch('https://probid-bid-platform.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (result.success) {
                // Save user info and go to dashboard
                sessionStorage.setItem('user', JSON.stringify(result.user));
                window.location.href = 'Dashboard.html';
            } else {
                // Show error message
                errorDiv.textContent = result.message;
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'Login failed. Is the Python API running?';
            errorDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
